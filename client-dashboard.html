<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>GarageOS — Mon espace</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f4f1;color:#1a1a1a;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e8e6e1;padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.topbar-left{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:#185FA5;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:15px;font-weight:700}
.client-name{font-weight:700;font-size:15px}
.client-sub{font-size:11px;color:#999}
.btn-logout{border:1px solid #d0cec9;border-radius:7px;padding:6px 12px;font-size:12px;background:#fff;cursor:pointer;color:#1a1a1a}
.container{max-width:900px;margin:0 auto;padding:20px}
.kgrid{display:grid;gap:12px;margin-bottom:20px}
.k2{grid-template-columns:repeat(2,1fr)}
.k3{grid-template-columns:repeat(3,1fr)}
.k4{grid-template-columns:repeat(4,1fr)}
@media (max-width:600px){.k2,.k3,.k4{grid-template-columns:1fr 1fr}}
.kpi{background:#fff;border:1px solid #e8e6e1;border-radius:9px;padding:13px 15px}
.kpi-lbl{font-size:11px;color:#999;margin-bottom:5px}
.kpi-val{font-size:19px;font-weight:700}
.section-title{font-weight:700;font-size:14px;margin:20px 0 10px}
.vcard{background:#fff;border:1px solid #e8e6e1;border-radius:10px;padding:14px 16px;margin-bottom:10px}
.vcard-head{display:flex;justify-content:space-between;align-items:flex-start}
.vcard-immat{font-weight:700;font-size:14px}
.vcard-modele{font-size:11px;color:#666;margin-top:2px}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-blue{background:#E6F1FB;color:#185FA5}
.b-green{background:#EAF3DE;color:#3B6D11}
.b-amber{background:#FAEEDA;color:#854F0B}
.b-red{background:#FCEBEB;color:#A32D2D}
.b-gray{background:#F1EFE8;color:#666}
.btn-detail{border:1px solid #d0cec9;border-radius:7px;padding:5px 11px;font-size:11px;background:#fff;cursor:pointer;color:#1a1a1a}
.vcard-foot{margin-top:8px;font-size:11px;color:#999}
.pieces-list{margin-top:8px;display:flex;gap:6px;flex-wrap:wrap}
.piece-chip{background:#f5f4f1;border-radius:6px;padding:3px 9px;font-size:11px}
.no-price-note{font-size:10px;color:#bbb;font-style:italic;margin-top:6px}
.search-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center}
.search-input{flex:1;min-width:180px;padding:9px 12px;border:1px solid #d0cec9;border-radius:8px;font-size:13px;font-family:inherit}
.date-input{padding:8px 10px;border:1px solid #d0cec9;border-radius:8px;font-size:12px;font-family:inherit}
.btn-filter{border:1px solid #d0cec9;border-radius:8px;padding:8px 14px;font-size:12px;background:#fff;cursor:pointer;color:#1a1a1a}
.btn-filter.active{background:#185FA5;color:#fff;border-color:#185FA5}
.btn-print-all{background:#3B6D11;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:12.5px;font-weight:600;cursor:pointer}
.filter-label{font-size:11px;color:#999}
table{width:100%;border-collapse:collapse;font-size:12px}
th{text-align:left;padding:6px 8px;font-size:11px;color:#999;font-weight:400;border-bottom:1px solid #e8e6e1}
td{padding:8px;border-bottom:1px solid #f0ede8}
.loading{text-align:center;padding:60px 20px;color:#999}
.empty{text-align:center;padding:30px;color:#999;font-size:13px}
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;padding:20px;z-index:100}
.detail-modal{background:#fff;border-radius:12px;max-width:520px;width:100%;max-height:85vh;overflow-y:auto;padding:20px}
.detail-modal h3{font-size:15px;margin-bottom:12px}
.detail-close{float:right;border:none;background:none;font-size:16px;cursor:pointer;color:#999}
</style>
</head>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo-icon">G</div>
    <div>
      <div class="client-name" id="topClientName">—</div>
      <div class="client-sub" id="topClientSub">—</div>
    </div>
  </div>
  <button class="btn-logout" onclick="deconnexion()">Deconnexion</button>
</div>

<div class="container" id="mainContent">

<div class="detail-overlay" id="detailOverlay" onclick="if(event.target===this)fermerDetail()">

</div>

<script>
var firebaseConfig = {
  apiKey: "AIzaSyDJncdc6aaiOO0Nl3_bGQ-8peSVa8gdmMU",
  authDomain: "garage-smart-erp.firebaseapp.com",
  projectId: "garage-smart-erp",
  storageBucket: "garage-smart-erp.firebasestorage.app",
  messagingSenderId: "200279404694",
  appId: "1:200279404694:web:ab323a97692797967952b7",
  databaseURL: "https://garage-smart-erp-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
var auth = firebase.auth();
var db = firebase.database();

var compteClient = null;
var mesVehicules = [];

// Etat de recherche/filtre, applique a l'affichage sans jamais modifier
// les donnees recues (filtrage cote client, purement visuel).
var rechercheTexte = '';
var periodeFiltre = 'tout'; // 'tout','custom'
var periodeDebut = null;
var periodeFin = null;

var LIV_ST = ['livre','facture_deposee','dossier_cloture'];
var STATUT_LABELS = {
  'nouveau':'Nouveau','diagnostic':'Diagnostic','chiffrage':'Chiffrage en cours',
  'attente_validation':'Attente validation','travaux_cours':'Travaux en cours',
  'attente_pieces':'Attente pieces','livre':'Livre','facture_deposee':'Facture deposee',
  'dossier_cloture':'Dossier cloture','attente_fin':'En cours de traitement',
  'devis_termine':'Devis envoye','devis_envoye':'Devis envoye'
};

function labelStatut(s){ return STATUT_LABELS[s] || (s||'—'); }
function formaterDelai(jours){
  if(jours===null || jours===undefined) return null;
  return jours<1 ? Math.round(jours*24)+'h' : jours.toFixed(1)+'j';
}
function estEnCours(v){ return LIV_ST.indexOf(v.status)<0; }

auth.onAuthStateChanged(function(user){
  if(!user){
    window.location.href = 'client.html';
    return;
  }
  chargerProfilEtDonnees(user.uid);
});

function chargerProfilEtDonnees(uid){
  db.ref('gos_client_accounts/'+uid).once('value').then(function(snap){
    if(!snap.exists()){
      afficherErreurGenerale('Profil client introuvable. Contactez le garage.');
      return;
    }
    compteClient = snap.val();
    document.getElementById('topClientName').textContent = compteClient.clientNom;
    document.getElementById('topClientSub').textContent = compteClient.departement
      ? 'Departement : '+compteClient.departement
      : 'Vue globale';
    chargerVehicules();
  }).catch(function(){
    afficherErreurGenerale('Erreur de connexion au serveur.');
  });
}

function chargerVehicules(){
  db.ref('gos_data/vehicles').once('value').then(function(snap){
    var raw = snap.val();
    var tous = [];
    try{ tous = JSON.parse(raw)||[]; }catch(e){ tous = []; }

    mesVehicules = tous.filter(function(v){
      if(v.client !== compteClient.clientNom) return false;
      if((v.tel||'') !== (compteClient.clientTel||'')) return false;
      if(compteClient.departement){
        return (v.departements||[]).indexOf(compteClient.departement) >= 0;
      }
      return true;
    });

    renderDashboard();
  }).catch(function(err){
    afficherErreurGenerale('Erreur de chargement des donnees.');
    console.error(err);
  });
}

function afficherErreurGenerale(msg){
  document.getElementById('mainContent').innerHTML = '<div class="empty">'+msg+'</div>';
}

// Regroupe tous les passages (objets vehicles distincts, meme immat) en un
// seul enregistrement "vehicule physique" avec l'historique complet. Chaque
// visite au garage cree un nouvel objet dans vehicles cote GarageOS — ce
// regroupement reconstitue le vrai historique par immatriculation, comme
// l'app Direction le fait deja ailleurs (comptage des interventions forfait).
function regrouperParImmatriculation(liste){
  var groupes = {};
  liste.forEach(function(v){
    var key = (v.immat||'sans-immat').toUpperCase();
    if(!groupes[key]) groupes[key] = [];
    groupes[key].push(v);
  });
  return Object.keys(groupes).map(function(key){
    var passages = groupes[key].sort(function(a,b){return (b.entree||0)-(a.entree||0);}); // plus recent d'abord

    // Kilometrage le plus recent connu (le champ km est saisi a chaque
    // passage ; on prend la valeur du passage le plus recent qui en a une).
    var dernierKm = null;
    for(var i=0;i<passages.length;i++){
      if(passages[i].km){ dernierKm = passages[i].km; break; }
    }

    // Delai moyen d'immobilisation : uniquement sur les passages termines
    // (entree ET livraison connues, livraison posterieure a l'entree).
    var delais = [];
    passages.forEach(function(p){
      if(p.entree && p.livraison && p.livraison>p.entree){
        var jours = (p.livraison-p.entree)/86400000;
        if(jours>0 && jours<365) delais.push(jours);
      }
    });
    var delaiMoyenJours = delais.length ? (delais.reduce(function(s,d){return s+d;},0)/delais.length) : null;

    // Nombre de retours : passages explicitement marques "Retour client"
    // par le garage a l'accueil (champ v.nature), pas un calcul deduit —
    // c'est une vraie information saisie indiquant qu'un vehicule revient
    // suite a une panne deja traitee.
    var nbRetours = passages.filter(function(p){return p.nature==='Retour client';}).length;

    // Age du vehicule : base sur la date de mise en circulation (mec) si
    // connue, sinon sur l'annee (v.annee) en repli. On cherche la premiere
    // valeur non vide parmi tous les passages (l'info peut avoir ete
    // saisie a un passage different du plus recent).
    var ageAnnees = null;
    for(var j=0;j<passages.length;j++){
      var p = passages[j];
      if(p.mec){
        var dMec = new Date(p.mec);
        if(!isNaN(dMec.getTime())){
          ageAnnees = (Date.now()-dMec.getTime())/(365.25*86400000);
          break;
        }
      }
      if(p.annee && !isNaN(parseInt(p.annee,10))){
        ageAnnees = new Date().getFullYear() - parseInt(p.annee,10);
        break;
      }
    }

    return {
      immat: key==='sans-immat' ? '' : key,
      marque: passages[0].marque,
      modele: passages[0].modele,
      typeClient: passages[0].typeClient,
      passages: passages,
      dernierPassage: passages[0],
      ageAnnees: ageAnnees,
      nbVisites: passages.length,
      dernierKm: dernierKm,
      delaiMoyenJours: delaiMoyenJours,
      nbRetours: nbRetours
    };
  });
}

// Applique la recherche texte (marque ou immatriculation) et le filtre de
// periode sur la liste brute des passages, AVANT le regroupement par
// immatriculation — pour qu'un vehicule dont aucune visite ne correspond a
// la periode choisie disparaisse completement de l'affichage.
function appliquerFiltres(liste){
  var q = rechercheTexte.trim().toLowerCase();
  return liste.filter(function(v){
    if(q){
      var immat = (v.immat||'').toLowerCase();
      var marque = (v.marque||'').toLowerCase();
      var modele = (v.modele||'').toLowerCase();
      if(immat.indexOf(q)<0 && marque.indexOf(q)<0 && modele.indexOf(q)<0) return false;
    }
    if(periodeFiltre==='custom' && periodeDebut && periodeFin){
      var dEntree = v.entree || 0;
      if(dEntree < periodeDebut || dEntree > periodeFin) return false;
    }
    return true;
  });
}

function onChangeRecherche(){
  rechercheTexte = document.getElementById('rechercheInput').value;
  renderDashboard();
}

function appliquerPeriode(){
  var deb = document.getElementById('periodeDebutInput').value;
  var fin = document.getElementById('periodeFinInput').value;
  if(!deb || !fin){ alert('Selectionnez les deux dates.'); return; }
  periodeDebut = new Date(deb).setHours(0,0,0,0);
  periodeFin = new Date(fin).setHours(23,59,59,999);
  periodeFiltre = 'custom';
  renderDashboard();
}

function reinitialiserPeriode(){
  periodeFiltre = 'tout';
  periodeDebut = null;
  periodeFin = null;
  document.getElementById('periodeDebutInput').value = '';
  document.getElementById('periodeFinInput').value = '';
  renderDashboard();
}

function renderDashboard(){
  var vehiculesFiltres = appliquerFiltres(mesVehicules);
  var vehiculesUniques = regrouperParImmatriculation(vehiculesFiltres);
  var vehiculesDevis = vehiculesUniques.filter(function(g){return g.typeClient!=='forfait';});
  var vehiculesForfait = vehiculesUniques.filter(function(g){return g.typeClient==='forfait';});

  var html = '';

  if(!mesVehicules.length){
    document.getElementById('mainContent').innerHTML = '<div class="empty">Aucun vehicule associe a votre compte pour le moment.</div>';
    return;
  }

  // Barre de recherche + filtre de periode + impression groupee. Toujours
  // affichee (meme si la recherche ne donne aucun resultat), pour que le
  // client puisse modifier/reinitialiser son filtre.
  html += '<div class="search-bar">';
  html += '<input type="text" class="search-input" id="rechercheInput" placeholder="Rechercher par marque ou immatriculation..." value="'+rechercheTexte.replace(/"/g,'&quot;')+'" oninput="onChangeRecherche()">';
  html += '<span class="filter-label">Periode :</span>';
  html += '<input type="date" class="date-input" id="periodeDebutInput" value="'+(periodeDebut?new Date(periodeDebut).toISOString().slice(0,10):'')+'">';
  html += '<span class="filter-label">a</span>';
  html += '<input type="date" class="date-input" id="periodeFinInput" value="'+(periodeFin?new Date(periodeFin).toISOString().slice(0,10):'')+'">';
  html += '<button class="btn-filter'+(periodeFiltre==='custom'?' active':'')+'" onclick="appliquerPeriode()">Appliquer</button>';
  if(periodeFiltre==='custom'){
    html += '<button class="btn-filter" onclick="reinitialiserPeriode()">Reinitialiser</button>';
  }
  html += '<button class="btn-print-all" onclick="imprimerToutHistorique()">&#128424; Imprimer tout l\'historique</button>';
  html += '<button class="btn-print-all" style="background:#185FA5" onclick="exporterToutHistoriqueExcel()">&#128202; Exporter tout en Excel</button>';
  html += '</div>';

  if(!vehiculesUniques.length){
    html += '<div class="empty">Aucun vehicule ne correspond a votre recherche.</div>';
    document.getElementById('mainContent').innerHTML = html;
    return;
  }

  if(vehiculesDevis.length){
    var coutTotalFlotte = 0;
    var facturesImpayees = 0;
    vehiculesFiltres.filter(function(v){return v.typeClient!=='forfait';}).forEach(function(v){
      if(v.chiffrage && v.chiffrage.lignes){
        var montantFacture = v.chiffrage.lignes.filter(function(cl){return (cl.piece||'').trim();})
          .reduce(function(s,cl){return s+(parseFloat(cl.prixVente)||0)*(parseInt(cl.qte)||1);},0);
        coutTotalFlotte += montantFacture;
        var paye = parseFloat(v.montantPaye)||0;
        if(montantFacture>paye) facturesImpayees += (montantFacture-paye);
      }
    });

    html += '<div class="kgrid k4">';
    html += kpiHtml('Vehicules actifs', vehiculesDevis.length);
    html += kpiHtml('Cout total flotte', coutTotalFlotte.toLocaleString('fr-FR')+' FCFA', '#185FA5');
    html += kpiHtml('Factures impayees', facturesImpayees.toLocaleString('fr-FR')+' FCFA', facturesImpayees>0?'#A32D2D':'#3B6D11');
    var delaisFlotteDevis = vehiculesDevis.filter(function(g){return g.delaiMoyenJours!==null;}).map(function(g){return g.delaiMoyenJours;});
    var delaiMoyenFlotteDevis = delaisFlotteDevis.length ? (delaisFlotteDevis.reduce(function(s,d){return s+d;},0)/delaisFlotteDevis.length) : null;
    html += kpiHtml('Immobilisation moyenne (flotte)', formaterDelai(delaiMoyenFlotteDevis)||'—');
    html += '</div>';

    html += '<div class="kgrid k3" style="margin-top:12px">';
    html += kpiHtml('Age moyen de la flotte', formaterAgeMoyen(vehiculesDevis));
    html += kpiHtml('Kilometrage moyen', formaterKmMoyen(vehiculesDevis));
    var totalRetoursDevis = vehiculesDevis.reduce(function(s,g){return s+(g.nbRetours||0);},0);
    html += kpiHtml('Nombre de retours', totalRetoursDevis, totalRetoursDevis>0?'#A32D2D':'#3B6D11');
    html += '</div>';

    html += '<div class="section-title">Vehicules en cours</div>';
    var enCoursDevis = vehiculesDevis.filter(function(g){return estEnCours(g.dernierPassage);});
    var autresDevis = vehiculesDevis.filter(function(g){return !estEnCours(g.dernierPassage);});
    if(enCoursDevis.length){
      enCoursDevis.forEach(function(g){ html += renderVehiculeCardDevis(g); });
    } else {
      html += '<div class="empty">Aucun vehicule en cours actuellement.</div>';
    }

    if(autresDevis.length){
      html += '<div class="section-title">Vos vehicules</div>';
      html += '<table><thead><tr><th>Vehicule</th><th>Statut</th><th style="text-align:center">Visites</th><th style="text-align:center">Retours</th><th style="text-align:right">Km</th><th style="text-align:right">Cout total</th><th></th></tr></thead><tbody>';
      autresDevis.forEach(function(g){
        var coutTotalImmat = 0;
        g.passages.forEach(function(p){
          if(p.chiffrage && p.chiffrage.lignes){
            coutTotalImmat += p.chiffrage.lignes.filter(function(cl){return (cl.piece||'').trim();})
              .reduce(function(s,cl){return s+(parseFloat(cl.prixVente)||0)*(parseInt(cl.qte)||1);},0);
          }
        });
        html += '<tr><td><strong>'+g.immat+'</strong> <span class="xs muted">'+(g.marque||'')+' '+(g.modele||'')+'</span></td>';
        html += '<td><span class="badge b-green">'+labelStatut(g.dernierPassage.status)+'</span></td>';
        html += '<td style="text-align:center">'+g.nbVisites+'</td>';
        html += '<td style="text-align:center">'+(g.nbRetours>0?'<span style="color:#A32D2D;font-weight:600">'+g.nbRetours+'</span>':'—')+'</td>';
        html += '<td style="text-align:right">'+(g.dernierKm?g.dernierKm.toLocaleString('fr-FR'):'—')+'</td>';
        html += '<td style="text-align:right;font-family:monospace">'+(coutTotalImmat?coutTotalImmat.toLocaleString('fr-FR')+' FCFA':'—')+'</td>';
        html += '<td><button class="btn-detail" onclick="ouvrirHistoriqueVehicule(\''+g.immat+'\')">Historique</button></td></tr>';
      });
      html += '</tbody></table>';
    }

    var facturesAAfficher = vehiculesFiltres.filter(function(v){
      return v.typeClient!=='forfait' && v.chiffrage && v.chiffrage.lignes && v.chiffrage.lignes.some(function(cl){return (cl.piece||'').trim();});
    });
    if(facturesAAfficher.length){
      html += '<div class="section-title">Vos factures</div>';
      html += '<table><thead><tr><th>Vehicule</th><th>Date</th><th style="text-align:right">Montant</th><th>Statut</th><th></th></tr></thead><tbody>';
      facturesAAfficher.forEach(function(v){
        var montantFacture = v.chiffrage.lignes.filter(function(cl){return (cl.piece||'').trim();})
          .reduce(function(s,cl){return s+(parseFloat(cl.prixVente)||0)*(parseInt(cl.qte)||1);},0);
        var paye = parseFloat(v.montantPaye)||0;
        var dateFacture = v.chiffrage.valideDirLe || v.chiffrage.soumisLe || v.entree;
        var statutLabel = paye>=montantFacture ? 'Payee' : (paye>0 ? 'Partiel' : 'En attente');
        var statutClasse = paye>=montantFacture ? 'b-green' : (paye>0 ? 'b-amber' : 'b-red');
        html += '<tr><td>'+(v.immat||'—')+'</td><td>'+(dateFacture?new Date(dateFacture).toLocaleDateString('fr-FR'):'—')+'</td>';
        html += '<td style="text-align:right;font-family:monospace">'+montantFacture.toLocaleString('fr-FR')+'</td>';
        html += '<td><span class="badge '+statutClasse+'">'+statutLabel+'</span></td>';
        html += '<td><button class="btn-detail" onclick="imprimerFacture(\''+v.id+'\')">Imprimer</button></td></tr>';
      });
      html += '</tbody></table>';
    }
  }

  if(vehiculesForfait.length){
    html += '<div class="kgrid k3" style="margin-top:'+(vehiculesDevis.length?'24px':'0')+'">';
    html += kpiHtml('Vehicules en forfait', vehiculesForfait.length);
    var nbInterventionsForfait = vehiculesFiltres.filter(function(v){return v.typeClient==='forfait';}).reduce(function(s,v){
      return s + ((v.chiffrage&&v.chiffrage.lignes) ? v.chiffrage.lignes.filter(function(cl){return (cl.piece||'').trim();}).length : 0);
    },0);
    html += kpiHtml('Interventions', nbInterventionsForfait);
    var delaisFlotteForfait = vehiculesForfait.filter(function(g){return g.delaiMoyenJours!==null;}).map(function(g){return g.delaiMoyenJours;});
    var delaiMoyenFlotteForfait = delaisFlotteForfait.length ? (delaisFlotteForfait.reduce(function(s,d){return s+d;},0)/delaisFlotteForfait.length) : null;
    html += kpiHtml('Immobilisation moyenne (flotte)', formaterDelai(delaiMoyenFlotteForfait)||'—');
    html += '</div>';

    html += '<div class="kgrid k3" style="margin-top:12px">';
    html += kpiHtml('Age moyen de la flotte', formaterAgeMoyen(vehiculesForfait));
    html += kpiHtml('Kilometrage moyen', formaterKmMoyen(vehiculesForfait));
    var totalRetoursForfait = vehiculesForfait.reduce(function(s,g){return s+(g.nbRetours||0);},0);
    html += kpiHtml('Nombre de retours', totalRetoursForfait, totalRetoursForfait>0?'#A32D2D':'#3B6D11');
    html += '</div>';

    html += '<div class="section-title">Vehicules en cours (forfait)</div>';
    var enCoursForfait = vehiculesForfait.filter(function(g){return estEnCours(g.dernierPassage);});
    var autresForfait = vehiculesForfait.filter(function(g){return !estEnCours(g.dernierPassage);});
    if(enCoursForfait.length){
      enCoursForfait.forEach(function(g){ html += renderVehiculeCardForfait(g); });
    } else {
      html += '<div class="empty">Aucun vehicule en cours actuellement.</div>';
    }

    if(autresForfait.length){
      html += '<div class="section-title">Vos vehicules (forfait)</div>';
      html += '<table><thead><tr><th>Vehicule</th><th>Statut</th><th style="text-align:center">Visites</th><th style="text-align:center">Retours</th><th style="text-align:right">Km</th><th></th></tr></thead><tbody>';
      autresForfait.forEach(function(g){
        html += '<tr><td><strong>'+g.immat+'</strong> <span class="xs muted">'+(g.marque||'')+' '+(g.modele||'')+'</span></td>';
        html += '<td><span class="badge b-green">'+labelStatut(g.dernierPassage.status)+'</span></td>';
        html += '<td style="text-align:center">'+g.nbVisites+'</td>';
        html += '<td style="text-align:center">'+(g.nbRetours>0?'<span style="color:#A32D2D;font-weight:600">'+g.nbRetours+'</span>':'—')+'</td>';
        html += '<td style="text-align:right">'+(g.dernierKm?g.dernierKm.toLocaleString('fr-FR'):'—')+'</td>';
        html += '<td><button class="btn-detail" onclick="ouvrirHistoriqueVehicule(\''+g.immat+'\')">Historique</button></td></tr>';
      });
      html += '</tbody></table>';
    }
  }

  document.getElementById('mainContent').innerHTML = html;
}

function kpiHtml(label, val, color){
  return '<div class="kpi"><div class="kpi-lbl">'+label+'</div><div class="kpi-val"'+(color?' style="color:'+color+'"':'')+'>'+val+'</div></div>';
}

// Age moyen de la flotte : moyenne des ages connus (mec ou annee), en
// ignorant les vehicules sans aucune de ces deux informations.
function formaterAgeMoyen(groupes){
  var ages = groupes.filter(function(g){return g.ageAnnees!==null;}).map(function(g){return g.ageAnnees;});
  if(!ages.length) return '—';
  var moyenne = ages.reduce(function(s,a){return s+a;},0)/ages.length;
  return moyenne.toFixed(1)+' an'+(moyenne>=2?'s':'');
}

// Kilometrage moyen de la flotte : moyenne du dernier km connu de chaque
// vehicule, en ignorant ceux dont le km n'a jamais ete saisi.
function formaterKmMoyen(groupes){
  var kms = groupes.filter(function(g){return g.dernierKm;}).map(function(g){return g.dernierKm;});
  if(!kms.length) return '—';
  var moyenne = Math.round(kms.reduce(function(s,k){return s+k;},0)/kms.length);
  return moyenne.toLocaleString('fr-FR')+' km';
}

function renderVehiculeCardDevis(g){
  var v = g.dernierPassage;
  var enCours = estEnCours(v);
  var statutClasse = enCours ? 'b-blue' : 'b-green';
  var coutTotalImmat = 0;
  g.passages.forEach(function(p){
    if(p.chiffrage && p.chiffrage.lignes){
      coutTotalImmat += p.chiffrage.lignes.filter(function(cl){return (cl.piece||'').trim();})
        .reduce(function(s,cl){return s+(parseFloat(cl.prixVente)||0)*(parseInt(cl.qte)||1);},0);
    }
  });
  var html = '<div class="vcard">';
  html += '<div class="vcard-head"><div>';
  html += '<div class="vcard-immat">'+(g.immat||'—')+' — '+(g.marque||'')+' '+(g.modele||'')+'</div>';
  html += '<div class="vcard-modele"><span class="badge '+statutClasse+'">'+labelStatut(v.status)+'</span> <span class="xs muted">&middot; '+g.nbVisites+' visite'+(g.nbVisites>1?'s':'')+' a l\'atelier</span></div>';
  html += renderInfosVehicule(g);
  html += renderInfosEnCours(v);
  html += '</div><button class="btn-detail" onclick="ouvrirHistoriqueVehicule(\''+g.immat+'\')">Historique complet</button></div>';
  if(coutTotalImmat>0){
    html += '<div class="vcard-foot">Cout total (toutes visites) sur ce vehicule : <strong>'+coutTotalImmat.toLocaleString('fr-FR')+' FCFA</strong></div>';
  }
  html += '</div>';
  return html;
}

function renderInfosVehicule(g){
  var delaiFormate = formaterDelai(g.delaiMoyenJours);
  var parts = [];
  if(g.dernierKm) parts.push(g.dernierKm.toLocaleString('fr-FR')+' km');
  if(delaiFormate) parts.push('Immobilisation moyenne : '+delaiFormate);
  if(g.nbRetours>0) parts.push('<span style="color:#A32D2D;font-weight:600">'+g.nbRetours+' retour'+(g.nbRetours>1?'s':'')+'</span>');
  if(!parts.length) return '';
  return '<div class="xs muted" style="margin-top:3px">'+parts.join(' &middot; ')+'</div>';
}

// Pour un vehicule EN COURS uniquement : temps d'immobilisation deja
// ecoule depuis l'entree (pas la moyenne historique), et la date de
// livraison prevue (v.livraison sert de date previsionnelle tant que le
// vehicule n'est pas encore effectivement livre).
function renderInfosEnCours(v){
  if(!estEnCours(v)) return '';
  var parts = [];
  if(v.entree){
    var joursEcoules = (Date.now()-v.entree)/86400000;
    parts.push('Immobilise depuis : <strong>'+formaterDelai(joursEcoules)+'</strong>');
  }
  if(v.livraison){
    var dPrevue = new Date(v.livraison);
    var enRetard = v.livraison < Date.now();
    parts.push('Livraison prevue : <strong'+(enRetard?' style="color:#A32D2D"':'')+'>'+dPrevue.toLocaleDateString('fr-FR')+(enRetard?' (en retard)':'')+'</strong>');
  }
  if(!parts.length) return '';
  return '<div class="xs" style="margin-top:5px;background:#FAEEDA;border-radius:6px;padding:6px 10px;color:#854F0B">'+parts.join(' &middot; ')+'</div>';
}

function renderVehiculeCardForfait(g){
  var v = g.dernierPassage;
  var enCours = estEnCours(v);
  var statutClasse = enCours ? 'b-blue' : 'b-green';
  var html = '<div class="vcard">';
  html += '<div class="vcard-head"><div>';
  html += '<div class="vcard-immat">'+(g.immat||'—')+' — '+(g.marque||'')+' '+(g.modele||'')+'</div>';
  html += '<div class="vcard-modele"><span class="badge '+statutClasse+'">'+labelStatut(v.status)+'</span> <span class="xs muted">&middot; '+g.nbVisites+' visite'+(g.nbVisites>1?'s':'')+' a l\'atelier</span></div>';
  html += renderInfosVehicule(g);
  html += renderInfosEnCours(v);
  html += '</div><button class="btn-detail" onclick="ouvrirHistoriqueVehicule(\''+g.immat+'\')">Historique complet</button></div>';
  if(v.chiffrage && v.chiffrage.lignes){
    var pieces = v.chiffrage.lignes.filter(function(cl){return (cl.piece||'').trim();});
    if(pieces.length){
      html += '<div class="pieces-list">';
      pieces.slice(0,6).forEach(function(cl){ html += '<span class="piece-chip">'+cl.piece+'</span>'; });
      if(pieces.length>6) html += '<span class="piece-chip">+'+(pieces.length-6)+' autre(s)</span>';
      html += '</div>';
      html += '<div class="no-price-note">Aucun montant affiche — couvert par votre forfait</div>';
    }
  }
  html += '</div>';
  return html;
}

// Affiche l'historique complet d'un vehicule (toutes les visites passees,
// meme immatriculation), avec pour chaque passage : dates d'entree/sortie,
// motif du client, et travaux/pieces effectues. C'est la vraie liste des
// evenements ; le prix n'apparait que pour un vehicule devis, jamais pour
// un forfait (coherent avec le reste du portail).
function ouvrirHistoriqueVehicule(immat){
  var g = regrouperParImmatriculation(mesVehicules).find(function(x){return x.immat===immat;});
  if(!g) return;
  var estForfait = g.typeClient==='forfait';

  var html = '<button class="detail-close" onclick="fermerDetail()">&#10005;</button>';
  html += '<h3>'+(g.immat||'—')+' — '+(g.marque||'')+' '+(g.modele||'')+'</h3>';

  var tauxRetour = g.nbVisites ? Math.round((g.nbRetours/g.nbVisites)*100) : 0;

  html += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:14px">';
  html += '<span class="badge b-gray">'+g.nbVisites+' visite'+(g.nbVisites>1?'s':'')+'</span>';
  if(g.dernierKm) html += '<span class="badge b-gray">'+g.dernierKm.toLocaleString('fr-FR')+' km</span>';
  if(g.delaiMoyenJours!==null) html += '<span class="badge b-gray">Immobilisation moyenne : '+formaterDelai(g.delaiMoyenJours)+'</span>';
  html += '<span class="badge '+(g.nbRetours>0?'b-red':'b-green')+'">Taux de retour : '+tauxRetour+'%'+(g.nbRetours>0?' ('+g.nbRetours+'/'+g.nbVisites+')':'')+'</span>';
  html += '</div>';

  g.passages.forEach(function(p, idx){
    var dateEntree = p.entree ? new Date(p.entree).toLocaleDateString('fr-FR') : '—';
    var dateSortie = (p.livraison && LIV_ST.indexOf(p.status)>=0) ? new Date(p.livraison).toLocaleDateString('fr-FR') : null;
    var lignes = (p.chiffrage && p.chiffrage.lignes) ? p.chiffrage.lignes.filter(function(cl){return (cl.piece||'').trim();}) : [];
    var montantPassage = estForfait ? 0 : lignes.reduce(function(s,cl){return s+(parseFloat(cl.prixVente)||0)*(parseInt(cl.qte)||1);},0);

    html += '<div style="border:1px solid #e8e6e1;border-radius:9px;padding:12px 14px;margin-bottom:10px">';
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px">';
    html += '<div><strong>Visite du '+dateEntree+'</strong>'+(dateSortie?' <span class="xs muted">au '+dateSortie+'</span>':' <span class="badge b-blue" style="margin-left:4px">En cours</span>')+'</div>';
    if(!estForfait && montantPassage>0){
      html += '<div style="font-family:monospace;font-weight:700">'+montantPassage.toLocaleString('fr-FR')+' FCFA</div>';
    }
    html += '</div>';
    if(p.motif){
      html += '<div class="xs" style="margin-bottom:6px"><span class="muted">Motif :</span> '+p.motif+'</div>';
    }
    var infosPassage = [];
    if(p.km) infosPassage.push(p.km.toLocaleString('fr-FR')+' km');
    if(p.entree && p.livraison && p.livraison>p.entree){
      infosPassage.push('Immobilise : '+formaterDelai((p.livraison-p.entree)/86400000));
    }
    if(p.nature==='Retour client'){
      infosPassage.push('<span style="color:#A32D2D;font-weight:600">Retour client</span>');
    }
    if(infosPassage.length){
      html += '<div class="xs muted" style="margin-bottom:6px">'+infosPassage.join(' &middot; ')+'</div>';
    }
    if(lignes.length){
      html += '<div class="xs muted" style="margin-bottom:4px">Travaux effectues :</div>';
      html += '<div class="pieces-list">';
      lignes.forEach(function(cl){ html += '<span class="piece-chip">'+cl.piece+(cl.qte>1?' (x'+cl.qte+')':'')+'</span>'; });
      html += '</div>';
    }
    if(!estForfait && lignes.length){
      html += '<div style="margin-top:8px"><button class="btn-detail" onclick="imprimerFacture(\''+p.id+'\')">Imprimer cette facture</button></div>';
    }
    html += '</div>';
  });

  html += '<div style="margin-top:10px;text-align:right;display:flex;gap:8px;justify-content:flex-end">';
  html += '<button class="btn-detail" onclick="exporterHistoriqueExcel(\''+immat+'\')">&#128202; Exporter en Excel</button>';
  html += '<button class="btn-detail" onclick="imprimerHistorique(\''+immat+'\')">&#128424; Imprimer</button>';
  html += '</div>';

  document.getElementById('detailModal').innerHTML = html;
  document.getElementById('detailOverlay').style.display = 'flex';
}

// Ouvre une fenetre d'impression avec l'historique complet d'un vehicule
// (toutes les visites, sans les prix pour un forfait).
// Export Excel de l'historique d'un vehicule : une ligne par piece/
// intervention, avec la visite (date, km, immobilisation, motif) repetee
// sur chaque ligne pour rester exploitable en tri/filtre Excel. Jamais de
// prix pour un vehicule forfait, coherent avec le reste du portail.
// Construit les lignes (tableau de tableaux) pour reproduire la mise en
// page visuelle de l'historique (comme le document imprime) : titre
// vehicule, taux de retour, puis pour chaque visite un mini-tableau
// Piece/Qte avec motif, dates, km au-dessus. Reutilisee par l'export d'un
// seul vehicule et par l'export de toute la flotte.
function construireLignesExcelVehicule(g){
  var estForfait = g.typeClient==='forfait';
  var rows = [];

  rows.push([g.immat+' — '+(g.marque||'')+' '+(g.modele||'')+' ('+g.nbVisites+' visite'+(g.nbVisites>1?'s':'')+')']);
  var tauxRetour = g.nbVisites ? Math.round((g.nbRetours/g.nbVisites)*100) : 0;
  var ligneInfos = 'Taux de retour : '+tauxRetour+'%'+(g.nbRetours>0?' ('+g.nbRetours+'/'+g.nbVisites+')':'');
  if(g.dernierKm) ligneInfos = g.dernierKm.toLocaleString('fr-FR')+' km — '+ligneInfos;
  rows.push([ligneInfos]);
  rows.push([]);

  g.passages.forEach(function(p){
    var dateEntree = p.entree ? new Date(p.entree).toLocaleDateString('fr-FR') : '—';
    var dateSortie = (p.livraison && LIV_ST.indexOf(p.status)>=0) ? new Date(p.livraison).toLocaleDateString('fr-FR') : 'En cours';
    rows.push(['Visite du '+dateEntree+' au '+dateSortie]);
    if(p.motif) rows.push(['Motif : '+p.motif+(p.km?' — '+p.km.toLocaleString('fr-FR')+' km':'')]);
    else if(p.km) rows.push([p.km.toLocaleString('fr-FR')+' km']);

    var lignes = (p.chiffrage && p.chiffrage.lignes) ? p.chiffrage.lignes.filter(function(cl){return (cl.piece||'').trim();}) : [];
    if(lignes.length){
      var entete = estForfait ? ['Piece','Qte'] : ['Piece','Qte','Prix unitaire (FCFA)','Total (FCFA)'];
      rows.push(entete);
      lignes.forEach(function(cl){
        var ligneTab = [cl.piece, cl.qte||1];
        if(!estForfait){
          var pu = parseFloat(cl.prixVente)||0;
          ligneTab.push(pu, pu*(parseInt(cl.qte)||1));
        }
        rows.push(ligneTab);
      });
    } else {
      rows.push(['Aucune intervention enregistree.']);
    }
    rows.push([]);
  });

  rows.push([]);
  return rows;
}

function exporterHistoriqueExcel(immat){
  var g = regrouperParImmatriculation(mesVehicules).find(function(x){return x.immat===immat;});
  if(!g) return;

  var rows = construireLignesExcelVehicule(g);
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:32},{wch:10},{wch:18},{wch:16}];
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, g.immat.substring(0,31));
  XLSX.writeFile(wb, 'Historique_'+g.immat+'.xlsx');
}


function imprimerHistorique(immat){
  var g = regrouperParImmatriculation(mesVehicules).find(function(x){return x.immat===immat;});
  if(!g) return;
  var estForfait = g.typeClient==='forfait';

  var html = '<html><head><meta charset="utf-8"><title>Historique '+g.immat+'</title>';
  html += '<style>body{font-family:Arial,sans-serif;padding:24px;color:#1a1a1a}h1{font-size:18px}h2{font-size:13px;margin-top:18px;border-bottom:1px solid #ccc;padding-bottom:4px}table{width:100%;border-collapse:collapse;margin-top:6px;font-size:12px}td,th{border:1px solid #ccc;padding:5px 8px;text-align:left}.tot{text-align:right;font-weight:700;margin-top:6px}.resume{margin-top:10px;font-size:12px;color:#444}</style></head><body>';
  html += '<h1>Historique vehicule — '+g.immat+' '+(g.marque||'')+' '+(g.modele||'')+'</h1>';
  html += '<div>Client : '+compteClient.clientNom+(compteClient.departement?' — '+compteClient.departement:'')+'</div>';
  html += '<div>'+g.nbVisites+' visite(s) au total — Edite le '+new Date().toLocaleDateString('fr-FR')+'</div>';

  var tauxRetour = g.nbVisites ? Math.round((g.nbRetours/g.nbVisites)*100) : 0;
  var elementsResume = [];
  if(g.dernierKm) elementsResume.push(g.dernierKm.toLocaleString('fr-FR')+' km');
  if(g.delaiMoyenJours!==null) elementsResume.push('Immobilisation moyenne : '+formaterDelai(g.delaiMoyenJours));
  elementsResume.push('Taux de retour : '+tauxRetour+'%'+(g.nbRetours>0?' ('+g.nbRetours+'/'+g.nbVisites+')':''));
  html += '<div class="resume">'+elementsResume.join(' &middot; ')+'</div>';

  g.passages.forEach(function(p){
    var dateEntree = p.entree ? new Date(p.entree).toLocaleDateString('fr-FR') : '—';
    var dateSortie = (p.livraison && LIV_ST.indexOf(p.status)>=0) ? new Date(p.livraison).toLocaleDateString('fr-FR') : 'En cours';
    var lignes = (p.chiffrage && p.chiffrage.lignes) ? p.chiffrage.lignes.filter(function(cl){return (cl.piece||'').trim();}) : [];
    html += '<h2>Visite du '+dateEntree+' au '+dateSortie+'</h2>';
    if(p.motif) html += '<div>Motif : '+p.motif+'</div>';
    var infosPassage = [];
    if(p.km) infosPassage.push(p.km.toLocaleString('fr-FR')+' km');
    if(p.entree && p.livraison && p.livraison>p.entree){
      infosPassage.push('Immobilise : '+formaterDelai((p.livraison-p.entree)/86400000));
    }
    if(p.nature==='Retour client') infosPassage.push('Retour client');
    if(infosPassage.length) html += '<div>'+infosPassage.join(' — ')+'</div>';
    if(lignes.length){
      html += '<table><thead><tr><th>Piece</th><th>Qte</th>'+(estForfait?'':'<th>Prix</th>')+'</tr></thead><tbody>';
      var total = 0;
      lignes.forEach(function(cl){
        var lt = (parseFloat(cl.prixVente)||0)*(parseInt(cl.qte)||1);
        total += lt;
        html += '<tr><td>'+cl.piece+'</td><td>'+(cl.qte||1)+'</td>'+(estForfait?'':'<td>'+lt.toLocaleString('fr-FR')+' FCFA</td>')+'</tr>';
      });
      html += '</tbody></table>';
      if(!estForfait) html += '<div class="tot">Total visite : '+total.toLocaleString('fr-FR')+' FCFA</div>';
    }
  });

  html += '</body></html>';
  var w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(function(){ w.print(); }, 300);
}

// Imprime l'historique complet de TOUS les vehicules actuellement visibles
// (respecte la recherche/periode active), un vehicule par page pour la
// lisibilite. Chaque page suit la meme regle prix/pas-prix que le detail
// individuel (jamais de prix pour un forfait).
// Export Excel de TOUTE la flotte visible (respecte recherche/periode
// actives) dans un seul fichier, un onglet par vehicule pour rester lisible
// (un onglet unique melangeant toutes les immatriculations serait moins
// exploitable pour un client avec une grande flotte).
function exporterToutHistoriqueExcel(){
  var vehiculesFiltres = appliquerFiltres(mesVehicules);
  var groupes = regrouperParImmatriculation(vehiculesFiltres);
  if(!groupes.length){ alert('Aucun vehicule a exporter.'); return; }

  var wb = XLSX.utils.book_new();
  var nomsOnglets = {}; // evite les doublons de nom d'onglet (max 31 caracteres, unicite Excel)

  groupes.forEach(function(g){
    var rows = construireLignesExcelVehicule(g);
    var ws = XLSX.utils.aoa_to_sheet(rows);
    ws['!cols'] = [{wch:32},{wch:10},{wch:18},{wch:16}];
    var nomOnglet = (g.immat||'sans-immat').substring(0,31);
    var suffixe = 1;
    while(nomsOnglets[nomOnglet]){ nomOnglet = (g.immat||'sans-immat').substring(0,28)+'_'+(++suffixe); }
    nomsOnglets[nomOnglet] = true;
    XLSX.utils.book_append_sheet(wb, ws, nomOnglet);
  });

  var nomFichier = 'Historique_'+(compteClient.clientNom||'client').replace(/[^a-zA-Z0-9_-]/g,'_')+'.xlsx';
  XLSX.writeFile(wb, nomFichier);
}


function imprimerToutHistorique(){
  var vehiculesFiltres = appliquerFiltres(mesVehicules);
  var groupes = regrouperParImmatriculation(vehiculesFiltres);
  if(!groupes.length){ alert('Aucun vehicule a imprimer.'); return; }

  var html = '<html><head><meta charset="utf-8"><title>Historique complet — '+compteClient.clientNom+'</title>';
  html += '<style>body{font-family:Arial,sans-serif;padding:24px;color:#1a1a1a}';
  html += 'h1{font-size:18px}h2{font-size:14px;margin-top:14px}h3{font-size:12.5px;margin-top:14px;border-bottom:1px solid #ccc;padding-bottom:4px}';
  html += 'table{width:100%;border-collapse:collapse;margin-top:6px;font-size:12px}td,th{border:1px solid #ccc;padding:5px 8px;text-align:left}';
  html += '.tot{text-align:right;font-weight:700;margin-top:6px}';
  html += '.vehicule-bloc{page-break-after:always;break-after:page;padding-bottom:20px}';
  html += '.vehicule-bloc:last-child{page-break-after:auto;break-after:auto}';
  html += '@media print{.vehicule-bloc{page-break-after:always;break-after:page}.vehicule-bloc:last-child{page-break-after:avoid;break-after:avoid}}';
  html += '</style></head><body>';

  html += '<h1>Historique complet — '+compteClient.clientNom+(compteClient.departement?' — '+compteClient.departement:'')+'</h1>';
  html += '<div>'+groupes.length+' vehicule(s) — Edite le '+new Date().toLocaleDateString('fr-FR')+'</div>';
  if(periodeFiltre==='custom'){
    html += '<div>Periode : '+new Date(periodeDebut).toLocaleDateString('fr-FR')+' au '+new Date(periodeFin).toLocaleDateString('fr-FR')+'</div>';
  }

  groupes.forEach(function(g){
    var estForfait = g.typeClient==='forfait';
    html += '<div class="vehicule-bloc">';
    html += '<h2>'+g.immat+' — '+(g.marque||'')+' '+(g.modele||'')+' ('+g.nbVisites+' visite'+(g.nbVisites>1?'s':'')+')</h2>';

    var tauxRetour = g.nbVisites ? Math.round((g.nbRetours/g.nbVisites)*100) : 0;
    var elementsResumeGroupe = [];
    if(g.dernierKm) elementsResumeGroupe.push(g.dernierKm.toLocaleString('fr-FR')+' km');
    if(g.delaiMoyenJours!==null) elementsResumeGroupe.push('Immobilisation moyenne : '+formaterDelai(g.delaiMoyenJours));
    elementsResumeGroupe.push('Taux de retour : '+tauxRetour+'%'+(g.nbRetours>0?' ('+g.nbRetours+'/'+g.nbVisites+')':''));
    html += '<div style="font-size:12px;color:#444;margin-bottom:8px">'+elementsResumeGroupe.join(' &middot; ')+'</div>';

    g.passages.forEach(function(p){
      var dateEntree = p.entree ? new Date(p.entree).toLocaleDateString('fr-FR') : '—';
      var dateSortie = (p.livraison && LIV_ST.indexOf(p.status)>=0) ? new Date(p.livraison).toLocaleDateString('fr-FR') : 'En cours';
      var lignes = (p.chiffrage && p.chiffrage.lignes) ? p.chiffrage.lignes.filter(function(cl){return (cl.piece||'').trim();}) : [];
      html += '<h3>Visite du '+dateEntree+' au '+dateSortie+'</h3>';
      if(p.motif) html += '<div>Motif : '+p.motif+'</div>';
      var infosPassage = [];
      if(p.km) infosPassage.push(p.km.toLocaleString('fr-FR')+' km');
      if(p.entree && p.livraison && p.livraison>p.entree){
        infosPassage.push('Immobilise : '+formaterDelai((p.livraison-p.entree)/86400000));
      }
      if(p.nature==='Retour client') infosPassage.push('Retour client');
      if(infosPassage.length) html += '<div>'+infosPassage.join(' — ')+'</div>';
      if(lignes.length){
        html += '<table><thead><tr><th>Piece</th><th>Qte</th>'+(estForfait?'':'<th>Prix</th>')+'</tr></thead><tbody>';
        var total = 0;
        lignes.forEach(function(cl){
          var lt = (parseFloat(cl.prixVente)||0)*(parseInt(cl.qte)||1);
          total += lt;
          html += '<tr><td>'+cl.piece+'</td><td>'+(cl.qte||1)+'</td>'+(estForfait?'':'<td>'+lt.toLocaleString('fr-FR')+' FCFA</td>')+'</tr>';
        });
        html += '</tbody></table>';
        if(!estForfait) html += '<div class="tot">Total visite : '+total.toLocaleString('fr-FR')+' FCFA</div>';
      }
    });

    html += '</div>';
  });

  html += '</body></html>';
  var w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(function(){ w.print(); }, 300);
}


// Imprime une facture individuelle (un seul passage), avec prix — jamais
// utilise pour un vehicule forfait (le bouton n'apparait que pour devis).
function imprimerFacture(passageId){
  var p = mesVehicules.find(function(x){return x.id===passageId;});
  if(!p) return;
  var lignes = (p.chiffrage && p.chiffrage.lignes) ? p.chiffrage.lignes.filter(function(cl){return (cl.piece||'').trim();}) : [];
  var total = lignes.reduce(function(s,cl){return s+(parseFloat(cl.prixVente)||0)*(parseInt(cl.qte)||1);},0);
  var dateFacture = p.chiffrage.valideDirLe || p.chiffrage.soumisLe || p.entree;

  var html = '<html><head><meta charset="utf-8"><title>Facture '+p.immat+'</title>';
  html += '<style>body{font-family:Arial,sans-serif;padding:24px;color:#1a1a1a}h1{font-size:18px}table{width:100%;border-collapse:collapse;margin-top:14px;font-size:13px}td,th{border:1px solid #ccc;padding:6px 10px;text-align:left}.tot{text-align:right;font-weight:700;margin-top:10px;font-size:14px}</style></head><body>';
  html += '<h1>Facture — '+(p.immat||'—')+' '+(p.marque||'')+' '+(p.modele||'')+'</h1>';
  html += '<div>Client : '+compteClient.clientNom+'</div>';
  html += '<div>Date : '+(dateFacture?new Date(dateFacture).toLocaleDateString('fr-FR'):'—')+'</div>';
  html += '<table><thead><tr><th>Piece</th><th>Qte</th><th>Prix</th></tr></thead><tbody>';
  lignes.forEach(function(cl){
    var lt = (parseFloat(cl.prixVente)||0)*(parseInt(cl.qte)||1);
    html += '<tr><td>'+cl.piece+'</td><td>'+(cl.qte||1)+'</td><td>'+lt.toLocaleString('fr-FR')+' FCFA</td></tr>';
  });
  html += '</tbody></table>';
  html += '<div class="tot">Total : '+total.toLocaleString('fr-FR')+' FCFA</div>';
  html += '</body></html>';

  var w = window.open('', '_blank');
  w.document.write(html);
  w.document.close();
  setTimeout(function(){ w.print(); }, 300);
}

function fermerDetail(){
  document.getElementById('detailOverlay').style.display = 'none';
}

function deconnexion(){
  auth.signOut().then(function(){
    window.location.href = 'client.html';
  });
}
